<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LimpiaGmail Pro</title>
    <style>
        :root { --red: #d93025; --green: #0b8043; --blue: #1a73e8; --bg: #f1f3f4; }
        body { font-family: -apple-system, sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; color: #3c4043; }
        
        .header { background: var(--red); color: white; padding: 40px 20px; border-radius: 0 0 24px 24px; margin: -20px -20px 20px -20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 1.8rem; }
        #user-mail { font-size: 0.9rem; opacity: 0.9; margin-top: 8px; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .btn-connect { background: var(--red); }
        .btn-scan { background: var(--green); }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        #status { font-size: 14px; margin: 15px 0; font-weight: 500; min-height: 20px; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--red); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 15px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Tarjetas */
        .card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; text-align: left; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 8px solid var(--red); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .remitente { font-size: 1.15rem; color: var(--blue); font-weight: bold; display: block; }
        .badge-conteo { display: inline-block; background: #feefee; color: var(--red); padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-top: 8px; }
        
        .grid-botones { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 12px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; border: 1px solid transparent; }
        .btn-ver { background: #fff; color: #3c4043; border-color: #dadce0; }
        .btn-borrar { background: var(--red); color: white; }
        .btn-baja { background: var(--green); color: white; }

        .guia { font-size: 12px; color: #70757a; background: #fff; padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LimpiaGmail Pro</h1>
        <div id="user-mail">Detectando sesión...</div>
    </div>

    <div id="status">Esperando conexión...</div>
    <div id="loader" class="loader"></div>
    
    <button id="btn-main" class="btn btn-connect">CONECTAR GMAIL</button>
    
    <div id="lista"></div>

    <div id="guia-container" class="guia">
        <b>¿Primera vez?</b> Pulsa Conectar, luego en "Configuración avanzada" e "Ir a LimpiaGmail (no seguro)".
    </div>

    <script>
        //// url aqui
        
const API_URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

const btn = document.getElementById('btn-main');
const status = document.getElementById('status');
const userMail = document.getElementById('user-mail');
const listaDiv = document.getElementById('lista');
const loader = document.getElementById('loader');
const guia = document.getElementById('guia-container');

// --- 1. DETECCIÓN AUTOMÁTICA AL CARGAR ---
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('login') === 'success') {
        pedirLista();
    } else {
        btn.style.display = 'block';
    }
};

// BOTÓN CONECTAR / REFRESCAR
btn.onclick = function() {
    if (btn.innerText.includes("CONECTAR")) {
        window.location.href = API_URL;
    } else {
        pedirLista();
    }
};

// --- 2. PETICIÓN DE LISTA (HISTÓRICA) ---
function pedirLista() {
    btn.style.display = 'none';
    if(guia) guia.style.display = 'none';
    loader.style.display = "block";
    status.innerText = "Conectando con Google... Obteniendo conteos históricos";

    const cb = "cb" + Date.now();
    window[cb] = function(data) {
        loader.style.display = "none";
        btn.style.display = 'block';
        if (data && data.lista) {
            status.innerText = "¡Lista recibida!";
            renderizar(data);
        } else {
            status.innerText = "Error de respuesta de Google.";
        }
        delete window[cb];
    };

    const s = document.createElement('script');
    s.src = `${API_URL}?action=list&callback=${cb}&nocache=${Math.random()}`;
    document.body.appendChild(s);
}

// --- 3. FUNCIÓN VER TODOS (SISTEMA DE ETIQUETA) ---
function verTodos(btnVer, email) {
    if(!email) return;
    
    const textoOriginal = btnVer.innerHTML;
    btnVer.disabled = true;
    btnVer.innerHTML = '⏳ Cargando...';

    const cb = "cb" + Date.now();
    
    // Reloj de seguridad: si en 10 segundos no hay respuesta, cancelamos
    const seguridad = setTimeout(() => {
        if (window[cb]) {
            btnVer.disabled = false;
            btnVer.innerHTML = textoOriginal;
            alert("El servidor de Google está tardando demasiado. Reintenta.");
            delete window[cb];
        }
    }, 10000);

    window[cb] = function(res) {
        clearTimeout(seguridad); // Detenemos el reloj de seguridad
        btnVer.disabled = false;
        btnVer.innerHTML = textoOriginal;
        
        if(res.status === "ok" && res.links && res.links.length > 0) {
            mostrarModalEnlaces(email, res.links);
        } else {
            alert("No se encontraron correos o hubo un error: " + (res.error || "Vacío"));
        }
        delete window[cb];
    };

    const s = document.createElement('script');
    s.src = `${API_URL}?action=getLinks&email=${encodeURIComponent(email)}&callback=${cb}`;
    document.body.appendChild(s);
}

// Función auxiliar para mostrar la ventana flotante
function mostrarModalEnlaces(email, links) {
    const listaHTML = links.map(l => `
        <div style="margin-bottom:12px; padding:12px; background:#f1f3f4; border-radius:8px; text-align:left; border:1px solid #ddd;">
            <a href="${l.url}" target="_blank" style="color:#d93025; text-decoration:none; font-weight:bold; font-size:15px; display:block;">
                ✉️ ${l.asunto}
            </a>
            <small style="color:#70757a;">${l.fecha}</small>
        </div>
    `).join('');

    const modal = document.createElement('div');
    modal.id = "visor-modal";
    modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box;";
    modal.innerHTML = `
        <div style="background:white; border-radius:20px; width:100%; max-width:400px; max-height:80vh; overflow-y:auto; padding:20px; position:relative;">
            <h3 style="margin-top:0;">Correos de ${email}</h3>
            ${listaHTML}
            <button onclick="document.getElementById('visor-modal').remove()" style="width:100%; padding:15px; background:#3c4043; color:white; border:none; border-radius:12px; margin-top:10px; font-weight:bold; cursor:pointer;">CERRAR</button>
        </div>`;
    document.body.appendChild(modal);
}
// --- 4. RENDERIZAR TARJETAS ---
function renderizar(data) {
    userMail.innerText = "Cuenta: " + data.email;
    btn.innerText = "REFRESCAR LISTA";
    btn.className = "btn btn-scan";
    btn.style.background = "#0b8043";
    status.innerText = "Remitentes encontrados: " + data.lista.length;

    let html = "";
    data.lista.forEach(item => {
        html += `
        <div class="card" id="card-${item.id}">
            <div class="card-header">
                <div style="flex:1">
                    <span class="remitente">${item.remitente}</span>
                    <div style="font-size: 0.85rem; color:#5f6368;">${item.email}</div>
                    <div class="badge-conteo">${item.conteo} correos</div>
                </div>
            </div>
            <div class="grid-botones">
                <button class="btn-action btn-ver" onclick="verTodos(this, '${item.email}')">Ver todos</button>
                <button class="btn-action btn-borrar" onclick="ejecutarBorradoMasivo('${item.id}', '${item.email}')">Borrar todo</button>
                <button class="btn-action btn-baja" onclick="ejecutar('${item.id}', 'unsubscribe', '${item.email}')">Baja</button>
            </div>
        </div>`;
    });
    listaDiv.innerHTML = html || "Bandeja impecable.";
}

// --- 5. ACCIONES (BORRADO Y BAJA) ---
function ejecutarBorradoMasivo(id, email) {
    if(!confirm("¿Seguro que quieres borrar todos los correos de " + email + "?\nEsta acción no se puede deshacer fácilmente.")) return;
    
    const card = document.getElementById('card-' + id);
    const btnBorrar = card.querySelector('.btn-borrar');
    const textoOriginal = btnBorrar.innerHTML;

    // 1. Bloqueo visual de la tarjeta y el botón
    card.style.opacity = "0.5";
    card.style.pointerEvents = "none";
    btnBorrar.innerHTML = "⏳ Eliminando...";

    const cb = "cb_" + Date.now();
    
    // Timeout de seguridad de 15 segundos
    const timer = setTimeout(() => {
        if (window[cb]) {
            card.style.opacity = "1";
            card.style.pointerEvents = "all";
            btnBorrar.innerHTML = textoOriginal;
            alert("Google está tardando demasiado. Comprueba tu Gmail en unos minutos.");
            delete window[cb];
        }
    }, 15000);

    window[cb] = function(res) {
        clearTimeout(timer);
        
        if (res.status === "ok") {
            // 2. Animación de salida si el borrado fue exitoso
            card.style.transition = "all 0.5s ease";
            card.style.transform = "translateX(150%)";
            setTimeout(() => card.remove(), 500);
            if (status) status.innerText = "Borrado completado para " + email;
        } else {
            // 3. Restaurar si hubo error
            card.style.opacity = "1";
            card.style.pointerEvents = "all";
            btnBorrar.innerHTML = textoOriginal;
            alert("Error al borrar: " + (res.error || "No se pudo completar"));
        }
        delete window[cb];
    };

    const s = document.createElement('script');
    s.src = `${API_URL}?action=delete&email=${encodeURIComponent(email)}&callback=${cb}`;
    document.body.appendChild(s);
}

// Función principal que inicia la búsqueda de baja
function ejecutar(id, accion, email) {
    if (accion !== 'unsubscribe') return;

    const card = document.getElementById('card-' + id);
    const btnBaja = card.querySelector('.btn-baja');
    const textoOriginal = btnBaja.innerHTML;

    btnBaja.innerHTML = "⏳ Localizando..."; // Feedback visual
    
    const cb = "cb_" + Date.now();
    window[cb] = function(res) {
        btnBaja.innerHTML = textoOriginal;
        if (res.status === "ok") {
            mostrarInterfazBaja(id, email, res.fecha, res.link);
        } else {
            alert("Error al conectar con Google.");
        }
        delete window[cb];
    };

    const s = document.createElement('script');
    s.src = `${API_URL}?action=getUnsubscribeData&email=${encodeURIComponent(email)}&callback=${cb}`;
    document.body.appendChild(s);
}

// Ventana emergente con los 3 botones solicitados
function mostrarInterfazBaja(id, email, fecha, link) {
    const estadoLink = link ? 
        `<b style="color:#0b8043;">✅ LINK LOCALIZADO</b>` : 
        `<b style="color:#d93025;">❌ NO LOCALIZADO</b>`;
    
    const modal = document.createElement('div');
    modal.id = "modal-baja";
    modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10001; display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box;";
    modal.innerHTML = `
        <div style="background:white; border-radius:24px; width:100%; max-width:400px; padding:25px; text-align:center;">
            <h3 style="margin:0 0 15px 0;">Gestión de Baja</h3>
            <p style="font-size:14px; margin-bottom:5px;">Último correo: <b>${fecha}</b></p>
            <p style="font-size:15px; margin-bottom:20px;">Estado: ${estadoLink}</p>
            
            <div style="display:flex; flex-direction:column; gap:12px;">
                <button onclick="window.open('${link}'); document.getElementById('modal-baja').remove();" 
                        ${!link ? 'disabled style="opacity:0.4"' : ''} 
                        style="padding:15px; background:#0b8043; color:white; border:none; border-radius:12px; font-weight:bold;">
                        DAR DE BAJA
                </button>
                
                <button onclick="window.open('${link}'); ejecutarBorradoMasivo('${id}', '${email}'); document.getElementById('modal-baja').remove();" 
                        ${!link ? 'disabled style="opacity:0.4"' : ''} 
                        style="padding:15px; background:#d93025; color:white; border:none; border-radius:12px; font-weight:bold;">
                        DAR DE BAJA Y BORRAR
                </button>
                
                <button onclick="document.getElementById('modal-baja').remove()" 
                        style="padding:15px; background:#f1f3f4; color:#3c4043; border:none; border-radius:12px; font-weight:bold;">
                        CANCELAR
                </button>
            </div>
        </div>`;
    document.body.appendChild(modal);
}

    let url = `${API_URL}?action=${accion}&id=${id}&callback=${cb}`;
    if (borrarTambien) url += `&extra=delete&email=${encodeURIComponent(email)}`;
    
    const s = document.createElement('script');
    s.src = url;
    document.body.appendChild(s);
}
    </script>
</body>
</html>
