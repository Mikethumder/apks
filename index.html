<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LimpiaGmail Pro</title>
    <style>
        :root { --red: #d93025; --green: #0b8043; --blue: #1a73e8; --bg: #f1f3f4; }
        body { font-family: -apple-system, sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; color: #3c4043; }
        
        .header { background: var(--red); color: white; padding: 40px 20px; border-radius: 0 0 24px 24px; margin: -20px -20px 20px -20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 1.8rem; }
        #user-mail { font-size: 0.9rem; opacity: 0.9; margin-top: 8px; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .btn-connect { background: var(--red); }
        .btn-scan { background: var(--green); }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        #status { font-size: 14px; margin: 15px 0; font-weight: 500; min-height: 20px; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--red); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 15px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Tarjetas */
        .card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; text-align: left; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 8px solid var(--red); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .remitente { font-size: 1.15rem; color: var(--blue); font-weight: bold; display: block; }
        .badge-conteo { display: inline-block; background: #feefee; color: var(--red); padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-top: 8px; }
        
        .grid-botones { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 12px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; border: 1px solid transparent; }
        .btn-ver { background: #fff; color: #3c4043; border-color: #dadce0; }
        .btn-borrar { background: var(--red); color: white; }
        .btn-baja { background: var(--green); color: white; }

        .guia { font-size: 12px; color: #70757a; background: #fff; padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LimpiaGmail Pro</h1>
        <div id="user-mail">Detectando sesión...</div>
    </div>

    <div id="status">Esperando conexión...</div>
    <div id="loader" class="loader"></div>
    
    <button id="btn-main" class="btn btn-connect">CONECTAR GMAIL</button>
    
    <div id="lista"></div>

    <div id="guia-container" class="guia">
        <b>¿Primera vez?</b> Pulsa Conectar, luego en "Configuración avanzada" e "Ir a LimpiaGmail (no seguro)".
    </div>

    <script>
      const API_URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

const btn = document.getElementById('btn-main');
const status = document.getElementById('status');
const userMail = document.getElementById('user-mail');
const listaDiv = document.getElementById('lista');
const loader = document.getElementById('loader');
const guia = document.getElementById('guia-container');

// --- 1. DETECCIÓN AUTOMÁTICA AL CARGAR ---
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    // Si venimos de Google con éxito
    if (params.get('login') === 'success') {
        status.innerText = "Conexión confirmada. Cargando...";
        pedirLista();
    } else {
        btn.style.display = 'block';
        status.innerText = "Listo para limpiar tu Gmail";
    }
};

// --- 2. BOTÓN CONECTAR / REFRESCAR ---
btn.onclick = function() {
    if (btn.classList.contains('btn-connect')) {
        status.innerText = "Redirigiendo a Google...";
        window.location.href = API_URL;
    } else {
        pedirLista();
    }
};

// --- 3. PEDIR LISTA (JSONP) ---
function pedirLista() {
    btn.style.display = 'none';
    if(guia) guia.style.display = 'none';
    loader.style.display = "block";
    status.innerText = "Buscando correos de +1 año... (espera 10s)";
    
    const cb = "callback_" + Math.floor(Math.random() * 1000000);
    window[cb] = function(data) {
        loader.style.display = "none";
        btn.style.display = 'block';
        if (data.lista) {
            renderizar(data);
        } else {
            status.innerText = "Error: " + (data.error || "Sin respuesta");
        }
        delete window[cb];
    };

    const s = document.createElement('script');
    s.src = `${API_URL}?action=list&callback=${cb}&t=${Date.now()}`;
    document.body.appendChild(s);
}

// --- 4. RENDERIZAR BLOQUES ---
function renderizar(data) {
    userMail.innerText = "Cuenta: " + data.email;
    btn.innerText = "REFRESCAR LISTA";
    btn.className = "btn btn-scan";
    btn.style.background = "#0b8043";
    status.innerText = "Remitentes encontrados: " + data.lista.length;

    let html = "";
    data.lista.forEach(item => {
        html += `
        <div class="card" id="card-${item.id}">
            <div class="card-header">
                <div style="flex:1">
                    <span class="remitente">${item.remitente}</span>
                    <div style="font-size: 0.85rem; color:#5f6368;">${item.asunto}</div>
                    <div class="badge-conteo">${item.conteo} correos</div>
                </div>
            </div>
            <div class="grid-botones">
                <button class="btn-action btn-ver" onclick="verTodos('${item.email}')">Ver todos</button>
                <button class="btn-action btn-borrar" onclick="ejecutarBorradoMasivo('${item.id}', '${item.email}')">Borrar todo</button>
                <button class="btn-action btn-baja" onclick="ejecutar('${item.id}', 'unsubscribe')">Baja</button>
            </div>
        </div>`;
    });
    listaDiv.innerHTML = html || "Bandeja impecable.";
}

// --- 5. BORRADO MASIVO ---
function ejecutarBorradoMasivo(id, email) {
    const card = document.getElementById('card-' + id);
    card.style.opacity = "0.3";
    card.style.pointerEvents = "none";
    
    const cb = "cb_" + Math.floor(Math.random() * 1000000);
    window[cb] = function(res) {
        if (res.status === "ok") {
            card.style.transition = "all 0.4s";
            card.style.transform = "scale(0)";
            setTimeout(() => card.remove(), 400);
        } else {
            card.style.opacity = "1";
            card.style.pointerEvents = "all";
            alert("Error al borrar.");
        }
        delete window[cb];
    };

    const s = document.createElement('script');
    s.src = `${API_URL}?action=delete&email=${encodeURIComponent(email)}&callback=${cb}&t=${Date.now()}`;
    document.body.appendChild(s);
}

function verTodos(email) {
    window.open(`https://mail.google.com/mail/u/0/#search/from%3A${encodeURIComponent(email)}`, '_blank');
}
    </script>
</body>
</html>
