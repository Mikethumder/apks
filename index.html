<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LimpiaGmail Pro</title>
    <style>
        :root { --red: #d93025; --green: #0b8043; --blue: #1a73e8; --bg: #f1f3f4; }
        body { font-family: -apple-system, sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; color: #3c4043; }
        
        .header { background: var(--red); color: white; padding: 40px 20px; border-radius: 0 0 24px 24px; margin: -20px -20px 20px -20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 1.8rem; }
        #user-mail { font-size: 0.9rem; opacity: 0.9; margin-top: 8px; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .btn-connect { background: var(--red); }
        .btn-scan { background: var(--green); }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        #status { font-size: 14px; margin: 15px 0; font-weight: 500; min-height: 20px; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--red); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 15px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 15px; text-align: left; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 8px solid var(--red); transition: transform 0.3s; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .remitente { font-size: 1.15rem; color: var(--blue); font-weight: bold; display: block; }
        .badge-conteo { display: inline-block; background: #feefee; color: var(--red); padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-top: 8px; }
        
        .grid-botones { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 12px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; border: 1px solid transparent; }
        .btn-ver { background: #fff; color: #3c4043; border-color: #dadce0; }
        .btn-borrar { background: var(--red); color: white; }
        .btn-baja { background: var(--green); color: white; }

        .guia { font-size: 12px; color: #70757a; background: #fff; padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LimpiaGmail Pro</h1>
        <div id="user-mail">Detectando sesión...</div>
    </div>

    <div id="status">Esperando conexión...</div>
    <div id="loader" class="loader"></div>
    
    <button id="btn-main" class="btn btn-connect">CONECTAR GMAIL</button>
    
    <div id="lista"></div>

    <div id="guia-container" class="guia">
        <b>¿Primera vez?</b> Pulsa Conectar, permite los permisos y vuelve aquí.
    </div>

    <script>
const API_URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

const btn = document.getElementById('btn-main');
const status = document.getElementById('status');
const userMail = document.getElementById('user-mail');
const listaDiv = document.getElementById('lista');
const loader = document.getElementById('loader');

// --- 1. COMUNICACIÓN CENTRALIZADA ---
function llamarGoogle(parametros, callbackProcesador) {
    loader.style.display = 'block';
    const cbName = "cb_" + Date.now();
    
    window[cbName] = function(data) {
        loader.style.display = 'none';
        callbackProcesador(data);
        delete window[cbName];
        document.getElementById(cbName)?.remove();
    };

    const script = document.createElement('script');
    script.id = cbName;
    let url = `${API_URL}?callback=${cbName}`;
    for (let clave in parametros) {
        url += `&${clave}=${encodeURIComponent(parametros[clave])}`;
    }
    script.src = url;
    script.onerror = () => {
        loader.style.display = 'none';
        status.innerText = "Error de conexión.";
    };
    document.body.appendChild(script);
}

// --- 2. FLUJO INICIAL ---
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('login') === 'success') {
        pedirLista();
    }
};

btn.onclick = function() {
    if (btn.innerText.includes("CONECTAR")) {
        window.location.href = API_URL;
    } else {
        pedirLista();
    }
};

function pedirLista() {
    status.innerText = "Conectando con Google...";
    
    // Nombre único para la función de retorno
    const cbName = "cb_" + Date.now();

    window[cbName] = function(data) {
        if (data.status === "ok") {
            renderizarTarjetas(data);
        } else {
            status.innerText = "Error: " + data.error;
        }
        delete window[cbName];
        document.getElementById(cbName)?.remove();
    };

    const script = document.createElement('script');
    script.id = cbName;
    // t=Date.now() fuerza a Google a enviar una respuesta nueva, no una fallida guardada
    script.src = `${API_URL}?action=list&callback=${cbName}&t=${Date.now()}`;
    
    script.onerror = () => {
        status.innerText = "Error de red: El script de Google no respondió.";
        console.error("No se pudo cargar:", API_URL);
    };

    document.body.appendChild(script);
}
        
// --- 3. RENDERIZADO ---
function renderizarTarjetas(data) {
    userMail.innerText = "Cuenta: " + data.email;
    btn.innerText = "REFRESCAR LISTA";
    btn.className = "btn btn-scan";
    status.innerText = "Remitentes encontrados: " + data.lista.length;

    let html = "";
    data.lista.forEach(item => {
        html += `
        <div class="card" id="card-${item.id}">
            <div class="card-header">
                <div style="flex:1">
                    <span class="remitente">${item.remitente}</span>
                    <div style="font-size: 0.85rem; color:#5f6368;">${item.email}</div>
                    <div class="badge-conteo">${item.conteo} correos</div>
                </div>
            </div>
            <div class="grid-botones">
                <button class="btn-action btn-ver" onclick="verTodos(this, '${item.email}')">Ver todos</button>
                <button class="btn-action btn-borrar" onclick="ejecutarBorradoMasivo('${item.id}', '${item.email}')">Borrar todo</button>
                <button class="btn-action btn-baja" onclick="buscarBaja('${item.id}', '${item.email}')">Baja</button>
            </div>
        </div>`;
    });
    listaDiv.innerHTML = html || "Bandeja impecable.";
}

// --- 4. ACCIONES ---
function verTodos(btnVer, email) {
    const textoOriginal = btnVer.innerText;
    btnVer.innerText = "⏳...";
    
    llamarGoogle({ action: 'getLinks', email: email }, function(res) {
        btnVer.innerText = textoOriginal;
        if(res.status === "ok") {
            const listaHTML = res.links.map(l => `
                <div style="margin-bottom:10px; padding:10px; background:#f8f9fa; border-radius:8px; border:1px solid #eee;">
                    <a href="${l.url}" target="_blank" style="color:var(--red); text-decoration:none; font-weight:bold; font-size:14px;">✉️ ${l.asunto}</a>
                    <div style="font-size:11px; color:gray;">${l.fecha}</div>
                </div>`).join('');
            
            mostrarModal(`Correos de ${email}`, listaHTML);
        }
    });
}

function ejecutarBorradoMasivo(id, email) {
    if(!confirm(`¿Borrar todos los correos de ${email}?`)) return;
    
    const card = document.getElementById('card-' + id);
    card.style.opacity = "0.5";

    llamarGoogle({ action: 'delete', email: email }, function(res) {
        if (res.status === "ok") {
            card.style.transform = "translateX(100%)";
            setTimeout(() => card.remove(), 300);
        } else {
            card.style.opacity = "1";
            alert("Error al borrar.");
        }
    });
}

function buscarBaja(id, email) {
    status.innerText = "Localizando link de baja...";
    llamarGoogle({ action: 'getUnsubscribeData', email: email }, function(res) {
        if (res.status === "ok") {
            mostrarInterfazBaja(id, email, res.fecha, res.link);
        }
    });
}

// --- 5. MODALES Y VENTANAS ---
function mostrarModal(titulo, contenido) {
    const modal = document.createElement('div');
    modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box;";
    modal.innerHTML = `
        <div style="background:white; border-radius:20px; width:100%; max-width:400px; max-height:80vh; overflow-y:auto; padding:20px;">
            <h3 style="margin-top:0;">${titulo}</h3>
            ${contenido}
            <button onclick="this.parentElement.parentElement.remove()" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:12px; margin-top:10px; font-weight:bold;">CERRAR</button>
        </div>`;
    document.body.appendChild(modal);
}

function mostrarInterfazBaja(id, email, fecha, link) {
    const html = `
        <p>Último correo: <b>${fecha}</b></p>
        <p>Estado: ${link ? '✅ Localizado' : '❌ No encontrado'}</p>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button onclick="window.open('${link}')" ${!link ? 'disabled' : ''} style="padding:15px; background:var(--green); color:white; border:none; border-radius:10px; font-weight:bold;">DAR DE BAJA</button>
            <button onclick="window.open('${link}'); ejecutarBorradoMasivo('${id}', '${email}'); this.parentElement.parentElement.parentElement.remove();" ${!link ? 'disabled' : ''} style="padding:15px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold;">BAJA Y BORRAR TODO</button>
        </div>`;
    mostrarModal("Gestión de Baja", html);
}
    </script>
</body>
</html>
