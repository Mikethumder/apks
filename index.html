<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimpiaGmail Pro</title>
    <style>
        :root { --red: #d93025; --green: #0b8043; }
        body { font-family: sans-serif; text-align: center; background: #f1f3f4; margin: 0; padding: 20px; }
        .header { background: var(--red); color: white; padding: 20px; border-radius: 0 0 20px 20px; margin: -20px -20px 20px -20px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid var(--red); }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; color: white; }
        .btn-connect { background: var(--red); }
        .btn-scan { background: var(--green); }
        #status { font-size: 14px; color: #666; margin: 10px 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--red); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>LimpiaGmail</h1>
        <div id="user-mail">Desconectado</div>
    </div>

    <div id="status">Cargando aplicación...</div>
    <div id="loader" class="loader"></div>
    
    <button id="btn-main" class="btn btn-connect">CONECTAR GMAIL</button>
    
    <div id="lista"></div>

    <script>
        // --- CONFIGURACIÓN ---
        const API_URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

        const btn = document.getElementById('btn-main');
        const status = document.getElementById('status');
        const userMail = document.getElementById('user-mail');
        const listaDiv = document.getElementById('lista');
        const loader = document.getElementById('loader');

        // --- 1. DETECTAR ESTADO AL CARGAR ---
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('login') === 'success') {
                status.innerText = "¡Conexión exitosa!";
                pedirLista();
            } else {
                status.innerText = "Listo para conectar";
            }
        };

        // --- 2. ACCIÓN DEL BOTÓN PRINCIPAL ---
        btn.onclick = function() {
            if (btn.classList.contains('btn-connect')) {
                // Ir a Google
                status.innerText = "Redirigiendo...";
                window.location.href = API_URL;
            } else {
                // Escanear si ya está conectado
                pedirLista();
            }
        };

        // --- 3. PEDIR DATOS (JSONP) ---
        function pedirLista() {
            loader.style.display = "block";
            status.innerText = "Buscando correos...";
            listaDiv.innerHTML = "";
            
            const cb = "callback_" + Math.floor(Math.random() * 1000000);
            window[cb] = function(data) {
                loader.style.display = "none";
                if (data.lista) {
                    renderizar(data);
                } else {
                    status.innerText = "Error: " + (data.error || "Sin respuesta");
                }
                delete window[cb];
            };

            const s = document.createElement('script');
            s.src = API_URL + "?action=list&callback=" + cb + "&t=" + Date.now();
            document.body.appendChild(s);
        }

        // --- 4. MOSTRAR CORREOS ---
        function renderizar(data) {
            userMail.innerText = data.email;
            btn.innerText = "ACTUALIZAR LISTA";
            btn.className = "btn btn-scan";
            status.innerText = "Encontrados: " + data.lista.length;

            let html = "";
            data.lista.forEach(item => {
                html += `
                <div class="card" id="card-${item.id}">
                    <b>${item.remitente}</b><br>
                    <small>${item.asunto}</small>
                    <div style="margin-top:10px;">
                        <button onclick="ejecutar('${item.id}', 'delete')" style="background:#ea4335; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Borrar</button>
                    </div>
                </div>`;
            });
            listaDiv.innerHTML = html;
        }

        // --- 5. EJECUTAR BORRADO ---
        function ejecutar(id, accion) {
            const card = document.getElementById('card-' + id);
            card.style.opacity = "0.3";
            
            const cb = "cb_" + Math.floor(Math.random() * 1000000);
            window[cb] = function(res) {
                if (res.status === "ok") {
                    card.remove();
                } else {
                    card.style.opacity = "1";
                    alert("No se pudo borrar");
                }
                delete window[cb];
            };

            const s = document.createElement('script');
            s.src = API_URL + "?action=" + accion + "&id=" + id + "&callback=" + cb;
            document.body.appendChild(s);
        }
    </script>
</body>
</html>
