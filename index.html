<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LimpiaGmail Pro</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f2f5; padding-top: 100px; margin: 0; }
        .btn {
            background: #d93025;
            color: white;
            padding: 25px 50px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            /* Esto obliga al botón a estar por encima de todo */
            position: relative;
            z-index: 9999; 
        }
        .btn:hover { background: #b31412; }
    </style>
</head>
<body>
    <h1>LimpiaGmail Pro</h1>
    <p id="msg">Pulsa el botón para empezar</p>
    
    <button class="btn" onclick="conectar()">CONECTAR MI GMAIL</button>

    <script>
        var URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

        function conectar() {
            var win = window.open(URL_SCRIPT, "_blank");
            document.getElementById('msg').innerText = "Esperando autorización...";
            
            var timer = setInterval(function() {
                if (!win || win.closed) {
                    clearInterval(timer);
                    location.reload();
                }
            }, 1000);
        }
    </script>
    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

    async function verificar() {
        // Miramos si venimos de la redirección de Google
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('login') === 'success') {
            console.log("Login detectado por URL");
        }

        try {
            const res = await fetch(API_URL + "?action=list&t=" + Date.now());
            const data = await res.json();
            if (data.email && data.email !== "No identificado") {
                document.getElementById('user-account').innerText = "Cuenta: " + data.email;
                document.getElementById('btn-login').innerText = "BUSCAR SUSCRIPCIONES";
                // Si ya estamos logueados, lanzamos el escaneo automáticamente
                escanearCorreos(); 
            }
        } catch(e) {
            console.log("Aún sin sesión");
        }
    }

    // El botón ahora abre Google en la MISMA pestaña para evitar líos de ventanas
    document.getElementById('btn-login').onclick = function() {
        window.location.href = API_URL;
    };

    window.onload = verificar;
</script>
</body>
</html>
