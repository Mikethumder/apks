<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LimpiaGmail Pro</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f2f5; padding-top: 100px; margin: 0; }
        .btn {
            background: #d93025;
            color: white;
            padding: 25px 50px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            /* Esto obliga al botón a estar por encima de todo */
            position: relative;
            z-index: 9999; 
        }
        .btn:hover { background: #b31412; }
    </style>
</head>
<body>
    <h1>LimpiaGmail Pro</h1>
    <p id="msg">Pulsa el botón para empezar</p>
    
    <button class="btn" onclick="conectar()">CONECTAR MI GMAIL</button>

    <script>
        var URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

        function conectar() {
            var win = window.open(URL_SCRIPT, "_blank");
            document.getElementById('msg').innerText = "Esperando autorización...";
            
            var timer = setInterval(function() {
                if (!win || win.closed) {
                    clearInterval(timer);
                    location.reload();
                }
            }, 1000);
        }
    </script>
</body>
</html>
