<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#d93025">
    <title>LimpiaGmail Pro</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="LimpiaGmail.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="LimpiaGmail.ico">

    <style>
        :root { --primary: #d93025; --bg: #f8f9fa; --text: #202124; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); overflow-x: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }

        /* Header adaptado al Notch */
        .header { 
            background: var(--primary); color: white; padding: 60px 20px 20px 20px; 
            text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .header h2 { margin: 0; font-size: 1.3rem; }
        #user-account { font-size: 0.8rem; margin-top: 5px; opacity: 0.9; }

        /* Controles */
        .controls { padding: 20px; background: white; border-bottom: 1px solid #e0e0e0; text-align: center; }
        .btn-main { 
            width: 100%; max-width: 400px; background: var(--primary); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(217, 48, 37, 0.3); cursor: pointer;
        }
        .btn-main:disabled { background: #ccc; }

        /* Lista de Correos */
        .container { padding: 15px; }
        .card { 
            background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 6px solid var(--primary);
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .sender { font-weight: bold; color: #1a73e8; }
        .count-badge { background: #fce8e6; color: var(--primary); padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-action { padding: 10px 5px; border-radius: 8px; border: 1px solid #dadce0; background: white; font-size: 0.7rem; font-weight: bold; }

        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 20px; overflow: hidden; }
        .modal-body { padding: 25px; text-align: center; }
        .modal-footer { padding: 15px; background: #f8f9fa; display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Spinner */
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h2>LimpiaGmail Pro</h2>
    <div id="user-account">Estado: Desconectado</div>
</div>

<div class="controls">
    <button class="btn-main" id="btn-scan" onclick="manejarAccionPrincipal()">CONECTAR MI GMAIL</button>
</div>

<div class="container">
    <div id="loading-overlay" style="display:none; text-align:center; padding: 30px;">
        <div class="spinner"></div>
        <p>Procesando...</p>
    </div>
    <div id="lista"></div>
</div>

<div id="modal-auth-info" class="modal">
    <div class="modal-content">
        <div class="modal-body">
            <div style="font-size: 40px; margin-bottom: 15px;">🛡️</div>
            <h3>Conexión Segura</h3>
            <p>Para analizar tus suscripciones, debemos conectar con tu cuenta de Google.</p>
            <p style="font-size: 0.8rem; background: #f1f3f4; padding: 10px; border-radius: 8px;">
                Acepta los permisos en la siguiente ventana (Configuración avanzada > Ir a LimpiaGmail).
            </p>
        </div>
        <div class="modal-footer">
            <button class="btn-modal" style="background:var(--primary); color:white;" onclick="abrirVentanaLogin()">CONECTAR AHORA</button>
        </div>
    </div>
</div>

<script>
    // URL DE TU SCRIPT (DEBE TERMINAR EN /exec)
    const API_URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec"; 
    
    let estaAutorizado = false;
    let winAuth;

    // Creamos el canal de escucha
const canalAuth = new BroadcastChannel('limpiagmail_auth');

canalAuth.onmessage = (event) => {
    if (event.data === 'login_exitoso') {
        console.log("Señal de login recibida");
        if (winAuth) winAuth.close(); // Intentamos cerrar la ventana desde aquí
        verificarSesion().then(() => {
            if(estaAutorizado) ejecutarEscaneo();
        });
    }
};

// Modifica también la función abrirVentanaLogin para que sea más robusta
function abrirVentanaLogin() {
    document.getElementById('modal-auth-info').style.display = 'none';
    
    // Limpiamos marcas antiguas
    localStorage.removeItem('gmail_login_status');

    const w = 500, h = 650;
    const left = (screen.width/2)-(w/2), top = (screen.height/2)-(h/2);
    winAuth = window.open(API_URL, 'GoogleAuth', `width=${w},height=${h},top=${top},left=${left}`);

    // VIGILANTE DE MEMORIA (El puente más seguro)
    const monitor = setInterval(() => {
        if (localStorage.getItem('gmail_login_status') === 'success') {
            clearInterval(monitor);
            if (winAuth) winAuth.close();
            localStorage.removeItem('gmail_login_status'); // Limpiamos para la próxima
            location.reload(); // Recarga total para activar la sesión
        }
        
        // Si el usuario cierra la ventana sin éxito (clic en la X)
        if (winAuth && winAuth.closed) {
            clearInterval(monitor);
            verificarSesion(); 
        }
    }, 500);
}
    // 1. Al cargar, verificar si ya hay sesión
    window.onload = verificarSesion;

    async function verificarSesion() {
        try {
            const res = await fetch(`${API_URL}?action=list`);
            const data = await res.json();
            if (data.email) {
                document.getElementById('user-account').innerText = "Cuenta: " + data.email;
                document.getElementById('btn-scan').innerText = "BUSCAR SUSCRIPCIONES";
                estaAutorizado = true;
            }
        } catch (e) {
            estaAutorizado = false;
        }
    }

    function manejarAccionPrincipal() {
        if (!estaAutorizado) {
            document.getElementById('modal-auth-info').style.display = 'flex';
        } else {
            ejecutarEscaneo();
        }
    }

   function abrirVentanaLogin() {
    document.getElementById('modal-auth-info').style.display = 'none';
    
    // Dimensiones para que Chrome lo detecte como interacción válida
    const w = 480, h = 600;
    const left = (screen.width/2)-(w/2), top = (screen.height/2)-(h/2);
    
    // Abrimos la ventana
    winAuth = window.open(API_URL, 'GoogleAuth', `width=${w},height=${h},top=${top},left=${left}`);

    // Este es el truco: Vigilamos el cierre pero al cerrar RECARGAMOS la sesión
    const timer = setInterval(async () => {
        if (!winAuth || winAuth.closed) {
            clearInterval(timer);
            
            // Forzamos un pequeño delay para que Google registre la sesión
            setTimeout(async () => {
                await verificarSesion(); 
                if(estaAutorizado) {
                    ejecutarEscaneo();
                } else {
                    // Si sigue sin detectar, intentamos una recarga dura
                    console.log("Reintentando conexión profunda...");
                    location.reload(); 
                }
            }, 1000);
        }
    }, 800);
}
    async function ejecutarEscaneo() {
        const loader = document.getElementById('loading-overlay');
        const listaDiv = document.getElementById('lista');
        loader.style.display = 'block';
        listaDiv.innerHTML = '';

        try {
            const res = await fetch(`${API_URL}?action=list&t=${new Date().getTime()}`);
            const data = await res.json();
            renderizarLista(data.lista);
        } catch (e) {
            alert("Error al cargar datos. Intenta conectar de nuevo.");
            estaAutorizado = false;
            verificarSesion();
        } finally {
            loader.style.display = 'none';
        }
    }

    function renderizarLista(datos) {
        const contenedor = document.getElementById('lista');
        if (!datos || datos.length === 0) {
            contenedor.innerHTML = '<p style="text-align:center; color:#999;">No se encontraron correos.</p>';
            return;
        }
        let html = '';
        datos.forEach(item => {
            html += `
                <div class="card">
                    <div class="card-header">
                        <span class="sender">${item.remitente.split('<')[0]}</span>
                        <span class="count-badge">${item.conteo}</span>
                    </div>
                    <div style="font-size:0.85rem; color:#666;">${item.asunto}</div>
                </div>`;
        });
        contenedor.innerHTML = html;
    }

    // Escucha global para el canal de autenticación
const bc = new BroadcastChannel('limpiagmail_auth');
bc.onmessage = (event) => {
    if (event.data === 'refresh') {
        location.reload(true); // Forzamos recarga desde el servidor, no cache
    }
};

async function verificarSesion() {
    try {
        // Añadimos un timestamp para que el navegador no use datos viejos
        const res = await fetch(`${API_URL}?action=list&cachebuster=${Date.now()}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        
        if (data.email && data.email !== "No identificado") {
            document.getElementById('user-account').innerText = "Cuenta: " + data.email;
            document.getElementById('btn-scan').innerText = "BUSCAR SUSCRIPCIONES";
            estaAutorizado = true;
            return true;
        }
    } catch (e) {
        estaAutorizado = false;
        return false;
    }
}
</script>
</body>
</html>
