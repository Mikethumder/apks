<!DOCTYPE html>
<html lang="es">
<head>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="icon" href="LimpiaGmail.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="LimpiaGmail.ico">
         
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#d93025">
    <title>LimpiaGmail Pro</title>

    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">

    <style>
        :root { --primary: #d93025; --bg: #f8f9fa; --text: #202124; }
        
        /* Reset de pantalla completa */
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg); overflow-x: hidden;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: var(--text); 
        }

        /* Header: 60px de padding superior para evitar la cámara/notch */
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 60px 20px 20px 20px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .header h2 { margin: 0; font-size: 1.3rem; font-weight: 600; }
        #user-account { font-size: 0.8rem; margin-top: 5px; opacity: 0.9; }

        /* Controles */
        .controls { padding: 20px; background: white; border-bottom: 1px solid #e0e0e0; }
        .btn-main { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(217, 48, 37, 0.3);
        }
        .btn-main:disabled { background: #ccc; }

        /* Contenedor y Tarjetas */
        .container { padding: 15px; }
        .card { 
            background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 6px solid var(--primary);
            transition: opacity 0.4s ease;
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .sender { font-weight: bold; color: #1a73e8; font-size: 1rem; }
        .count-badge { background: #fce8e6; color: var(--primary); padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .subject { font-size: 0.85rem; color: #5f6368; margin-bottom: 15px; }

        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-action { padding: 10px 5px; border-radius: 8px; border: 1px solid #dadce0; background: white; font-size: 0.7rem; font-weight: bold; color: #3c4043; }

        /* Spinner de carga animado */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1); width: 40px; height: 40px;
            border-radius: 50%; border-left-color: var(--primary);
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modales */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; 
        }
        .modal-content { background: white; width: 90%; max-height: 80%; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .modal-body { padding: 25px; overflow-y: auto; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; color: #333; }
        .modal-footer { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 14px; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>LimpiaGmail Pro</h2>
    <div id="user-account">Cuenta: Detectando...</div>
</div>

<div class="controls">
    <button class="btn-main" id="btn-scan" onclick="escanear()">BUSCAR SUSCRIPCIONES</button>
</div>

<div class="container">
    <div id="loading-overlay" style="display:none; text-align:center; padding: 50px 0;">
        <div class="spinner"></div>
        <p style="color: #666;">Analizando correos...</p>
    </div>
    <div id="lista"></div>
</div>

<div id="modal-view" class="modal">
    <div class="modal-content">
        <div id="view-body" class="modal-body"></div>
        <div class="modal-footer">
            <button class="btn-modal" style="background:#5f6368; color:white;" onclick="cerrarModal('modal-view')">VOLVER</button>
        </div>
    </div>
</div>

<div id="modal-confirm" class="modal">
    <div class="modal-content" style="max-width: 300px;">
        <div class="modal-body" id="confirm-text" style="text-align:center;"></div>
        <div class="modal-footer">
            <button class="btn-modal" style="background:var(--primary); color:white;" id="btn-si">BORRAR</button>
            <button class="btn-modal" style="background:#eee;" onclick="cerrarModal('modal-confirm')">NO</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";
    
    let datosLocales = [];
    let idTemporal = "";

   async function escanear() {
    const btn = document.getElementById('btn-scan');
    const loader = document.getElementById('loading-overlay');
    
    // 1. Intentamos la conexión rápida
    btn.disabled = true;
    loader.style.display = 'block';

    try {
        const res = await fetch(`${API_URL}?action=list`);
        
        // Si hay error de permisos (CORS), saltará al 'catch'
        const data = await res.json();
        
        document.getElementById('user-account').innerText = "Cuenta: " + data.email;
        datosLocales = data.lista || [];
        renderizarLista();
        
    } catch (e) {
        // 2. Si falla por falta de login, abrimos la ventana
        // Ponemos un mensaje claro antes del aviso de Chrome
        if(confirm("Para ver TUS correos, Google necesita tu permiso. ¿Quieres conectar tu cuenta ahora?")) {
            const authWindow = window.open(API_URL, '_blank');
            
            // Esperamos a que el usuario cierre la ventana para re-intentar
            const timer = setInterval(() => {
                if (authWindow && authWindow.closed) {
                    clearInterval(timer);
                    escanear(); 
                }
            }, 1000);
        }
    } finally {
        loader.style.display = 'none';
        btn.disabled = false;
    }
}

    function renderizarLista() {
        const contenedor = document.getElementById('lista');
        if (datosLocales.length === 0) {
            contenedor.innerHTML = '<p style="text-align:center; margin-top:40px; color:#999;">No hay nada que limpiar.</p>';
            return;
        }

        let html = '';
        datosLocales.forEach(item => {
            const nombre = item.remitente.split('<')[0].replace(/"/g, '') || "Remitente";
            html += `
                <div class="card" id="card-${item.id}">
                    <div class="card-header">
                        <span class="sender">${nombre}</span>
                        <span class="count-badge">${item.conteo}</span>
                    </div>
                    <div class="subject">${item.asunto}</div>
                    <div class="actions">
                        <button class="btn-action" onclick="visualizar('${item.id}')">VER</button>
                        <button class="btn-action" onclick="pedirConfirmacion('${item.id}', ${item.conteo})">BORRAR</button>
                        <button class="btn-action" onclick="window.open('${item.enlaceBaja}')" ${!item.enlaceBaja ? 'disabled style="opacity:0.4"' : ''}>BAJA</button>
                    </div>
                </div>`;
        });
        contenedor.innerHTML = html;
    }

    async function visualizar(id) {
        abrirModal('modal-view');
        const viewBody = document.getElementById('view-body');
        viewBody.innerHTML = '<div class="spinner"></div><p style="text-align:center">Cargando...</p>';
        
        try {
            const res = await fetch(`${API_URL}?action=getContent&id=${id}`);
            const data = await res.json();
            viewBody.innerText = data.cuerpo || "Mensaje vacío.";
        } catch (e) { viewBody.innerText = "Error al leer el correo."; }
    }

    function pedirConfirmacion(id, total) {
        idTemporal = id;
        document.getElementById('confirm-text').innerText = `¿Enviar ${total} correos a la papelera?`;
        abrirModal('modal-confirm');
        document.getElementById('btn-si').onclick = borrarYa;
    }

    async function borrarYa() {
        const id = idTemporal;
        cerrarModal('modal-confirm');
        const card = document.getElementById(`card-${id}`);
        if(card) card.style.opacity = '0.3';
        
        await fetch(`${API_URL}?action=delete&ids=${id}`);
        if(card) card.remove();
        datosLocales = datosLocales.filter(i => i.id !== id);
    }

    function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
    function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
