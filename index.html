<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LimpiaGmail</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 50px; background: #f0f0f0; }
        /* Forzamos el cursor para confirmar que el botón es clickable */
        .boton { 
            background: #d93025; 
            color: white; 
            padding: 20px 40px; 
            border-radius: 10px; 
            font-weight: bold; 
            border: none; 
            cursor: pointer !important; 
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .boton:hover { background: #b31412; }
    </style>
</head>
<body>

    <h2>LimpiaGmail Pro</h2>
    <p id="status">Estado: Cargando...</p>
    
    <button class="boton" onclick="conectar()">CONECTAR MI GMAIL</button>

    <script>
        // LA URL DE TU SCRIPT
        var URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

        function conectar() {
            console.log("Clic detectado");
            // 1. Abrir la ventana de Google
            var win = window.open(URL, "_blank", "width=500,height=600");
            
            // 2. Avisar al usuario
            document.getElementById('status').innerText = "Estado: Esperando autorización...";

            // 3. Vigilar el cierre
            var timer = setInterval(function() {
                if (!win || win.closed) {
                    clearInterval(timer);
                    location.reload();
                }
            }, 1000);
        }

        // Comprobar estado al entrar (versión compatible antigua)
        fetch(URL + "?action=list")
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.email) {
                    document.getElementById('status').innerText = "Conectado: " + data.email;
                } else {
                    document.getElementById('status').innerText = "Estado: Desconectado";
                }
            })
            .catch(function() {
                document.getElementById('status').innerText = "Estado: Listo para conectar";
            });
    </script>
</body>
</html>
