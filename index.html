<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

    // Función principal que se ejecuta al cargar
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // Si acabamos de volver de Google (traemos ?login=success en la URL)
        if (urlParams.get('login') === 'success') {
            document.getElementById('status').innerText = "¡Conexión confirmada!";
            ejecutarCargaDeCorreos();
        } else {
            // Si no, verificamos sesión de forma normal
            verificarSesionSilenciosa();
        }
    };

    async function verificarSesionSilenciosa() {
        try {
            const res = await fetch(API_URL + "?action=list&t=" + Date.now());
            const data = await res.json();
            if (data.email && data.email !== "No identificado") {
                mostrarInterfazLogueado(data.email);
            }
        } catch (e) {
            console.log("Sesión no detectada automáticamente.");
        }
    }

    function mostrarInterfazLogueado(email) {
        document.getElementById('user-account').innerText = "Cuenta: " + email;
        const btn = document.getElementById('btn-login');
        btn.innerText = "BUSCAR SUSCRIPCIONES";
        btn.onclick = ejecutarCargaDeCorreos;
        btn.style.background = "#0b8043"; // Cambiamos a verde para indicar éxito
    }

    async function ejecutarCargaDeCorreos() {
        const status = document.getElementById('status');
        const listaDiv = document.getElementById('lista');
        
        status.innerText = "Buscando correos (esto puede tardar 10s)...";
        listaDiv.innerHTML = '<div class="spinner"></div>';

        try {
            // Añadimos el timestamp para evitar la caché del navegador
            const res = await fetch(API_URL + "?action=list&t=" + Date.now());
            const data = await res.json();
            
            if (data.lista && data.lista.length > 0) {
                let html = "";
                data.lista.forEach(item => {
                    html += `
                        <div style="background:white; padding:15px; border-radius:10px; margin-bottom:10px; border-left:5px solid #d93025; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                            <div style="font-weight:bold; color:#1a73e8;">${item.remitente}</div>
                            <div style="font-size:0.9rem;">${item.asunto}</div>
                        </div>`;
                });
                listaDiv.innerHTML = html;
                status.innerText = "Escaneo completado. Encontrados: " + data.lista.length;
                mostrarInterfazLogueado(data.email);
            } else {
                listaDiv.innerHTML = "No se encontraron correos de suscripciones.";
                status.innerText = "Escaneo finalizado.";
            }
        } catch (e) {
            status.innerText = "Error de conexión. Inténtalo de nuevo.";
            console.error(e);
        }
    }
</script>
