<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LimpiaGmail Test</title>
</head>
<body style="text-align: center; padding-top: 100px; font-family: Arial; background: #eee;">

    <h1>LimpiaGmail Pro</h1>
    <p id="info">Estado: Esperando clic</p>

    <button id="boton" 
            onclick="conectar()" 
            style="background: #d93025; color: white; padding: 25px 50px; font-size: 20px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer !important; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: inline-block;">
        CONECTAR AHORA
    </button>

    <script>
        // TU URL DE GOOGLE
        var urlGoogle = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";

        function conectar() {
            alert("¡Botón pulsado correctamente!"); // Esto nos dirá si el JS vive
            var win = window.open(urlGoogle, "_blank");
            
            var t = setInterval(function() {
                if (!win || win.closed) {
                    clearInterval(t);
                    location.reload();
                }
            }, 1000);
        }
    </script>

</body>
</html>
