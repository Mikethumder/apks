<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimpiaGmail</title>
    <style>
        body { margin: 0; font-family: sans-serif; text-align: center; background: #f8f9fa; }
        .header { background: #d93025; color: white; padding: 50px 20px 20px; }
        .btn-main { 
            display: block; width: 80%; max-width: 300px; margin: 50px auto;
            background: #d93025; color: white; border: none; padding: 20px; 
            border-radius: 12px; font-weight: bold; font-size: 1.2rem;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }
        #user-account { margin-top: 10px; color: #666; }
    </style>
</head>
<body>

<div class="header">
    <h2>LimpiaGmail Pro</h2>
    <div id="user-account">Estado: Verificando...</div>
</div>

<button class="btn-main" id="btn-login">CONECTAR GMAIL</button>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwW9vmPpd5Wg8PWFmISCL-IBEzDoIeFTT-iLaO8SOTuFOGS9xowj-tmVLyW5UMZ8qK_Yg/exec";
    const btn = document.getElementById('btn-login');

    // 1. Verificar si ya estás logueado
    async function checkStatus() {
        try {
            const response = await fetch(API_URL + "?action=list");
            const data = await response.json();
            if (data.email && data.email !== "No identificado") {
                document.getElementById('user-account').innerText = "Cuenta: " + data.email;
                btn.innerText = "BUSCAR CORREOS";
            } else {
                document.getElementById('user-account').innerText = "Estado: Desconectado";
            }
        } catch (e) {
            document.getElementById('user-account').innerText = "Estado: Sin conexión";
        }
    }

    // 2. Acción de clic ultra-simple
    btn.onclick = function() {
        console.log("Clic detectado");
        // Abrimos la ventana de Google
        const win = window.open(API_URL, '_blank', 'width=500,height=600');
        
        // Esperar a que se cierre para recargar
        const timer = setInterval(function() {
            if (!win || win.closed) {
                clearInterval(timer);
                location.reload();
            }
        }, 1000);
    };

    window.onload = checkStatus;
</script>
</body>
</html>
